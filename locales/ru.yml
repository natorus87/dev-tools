about:
  content: >
    # О IT-Tools

    Этот замечательный сайт, созданный с ❤ [Corentin Thomasset](https://corentin.tech?utm_source=it-tools&utm_medium=about), объединяет полезные инструменты для разработчиков и людей, работающих в ИТ. Если он вам понравился, поделитесь им с друзьями и не забудьте добавить в закладки!

    IT Tools — это проект с открытым исходным кодом (лицензия GPL-3.0), он бесплатен и всегда будет таким. Однако поддержка домена и хостинга требует затрат. Если вы хотите поддержать мою работу, [станьте спонсором](https://www.buymeacoffee.com/cthmsst).

    ## Технологии

    IT Tools построен на Vue.js (Vue 3) с использованием библиотеки компонентов Naive UI и развернут на Vercel. В некоторых инструментах используются сторонние библиотеки, полный список которых можно найти в файле [package.json](https://github.com/CorentinTh/it-tools/blob/main/package.json).

    ## Нашли ошибку? Не хватает инструмента?

    Если вам нужен инструмент, которого здесь нет, создайте запрос в [разделе issues](https://github.com/CorentinTh/it-tools/issues/new/choose) на GitHub.

    Если вы нашли баг, пожалуйста, сообщите о нем там же.
